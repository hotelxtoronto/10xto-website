name: Deploy Theme to WHC

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  web-deploy:
    name: Deploy to WHC
    runs-on: ubuntu-latest
    steps:
    - name: Get latest code
      uses: actions/checkout@v4

    - name: Deploy to WHC via True SFTP Sync
      uses: wangyucode/sftp-upload-action@v2.0.2
      with:
        host: ${{ secrets.SFTP_SERVER }}
        username: ${{ secrets.SFTP_USERNAME }}
        password: ${{ secrets.SFTP_PASSWORD }}
        port: ${{ secrets.SFTP_PORT }}
        localDir: '.'
        remoteDir: 'public_html/wp-content/themes/10xto-wordpress-theme'
        exclude: '.git,.github'
        dryRun: false
